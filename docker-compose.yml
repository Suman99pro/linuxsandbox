services:

  nginx:
    image: nginx:alpine
    container_name: linuxsandbox-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      linuxsandbox:
        condition: service_healthy
    networks:
      - sandbox-net

  linuxsandbox:
    build: .
    container_name: linuxsandbox
    restart: unless-stopped
    # NOT exposed to host — only reachable via nginx on the internal network
    expose:
      - "3000"
    environment:
      PORT: 3000
      MAX_SESSIONS: 20
      MEMORY_LIMIT: 128m
      CPU_QUOTA: 50000
    volumes:
      # Mount Docker socket so the app can spin up sibling containers
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - sandbox-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

networks:
  sandbox-net:
    driver: bridge
